name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-composer:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      # Block commits that hardcode "version" in composer.json (breaks Packagist tags).
      - name: Validate composer.json
        run: composer validate --no-check-publish --strict

  analyse-test:
    name: Analyse & Test
    runs-on: ubuntu-latest
    needs: validate-composer
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, tokenizer, ctype, json, dom
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Static analysis (PHPStan, level max)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Unit tests (PHPUnit)
        run: vendor/bin/phpunit --no-coverage

  lint:
    name: Lint (auto-fix)
    runs-on: ubuntu-latest
    needs: validate-composer
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Fix code style (Pint)
        run: vendor/bin/pint

      - name: Commit Pint fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: apply Pint fixes [skip ci]"
          file_pattern: "*.php"
